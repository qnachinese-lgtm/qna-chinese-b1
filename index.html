<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>華語文能力測驗 B1 進階級｜練習平台</title>
<style>
  :root{
    --primary:#2563eb; --primary-dark:#1e40af; --bg:#f1f5f9; --card:#ffffff;
    --text:#1e293b; --muted:#64748b; --green:#16a34a; --red:#dc2626;
    --green-bg:#f0fdf4; --red-bg:#fef2f2; --border:#e2e8f0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;}
  .container{max-width:860px;margin:0 auto;padding:16px;}
  header{background:var(--primary);color:#fff;padding:14px 0;}
  header .container{display:flex;align-items:center;justify-content:space-between;padding-top:0;padding-bottom:0;}
  header h1{font-size:1.15rem;}
  header .userbox{display:flex;gap:8px;align-items:center;font-size:.9rem;flex-wrap:wrap;}
  .btn{display:inline-block;border:none;border-radius:8px;padding:10px 18px;font-size:1rem;cursor:pointer;background:var(--primary);color:#fff;font-family:inherit;}
  .btn:hover{background:var(--primary-dark);}
  .btn.small{padding:5px 12px;font-size:.85rem;}
  .btn.ghost{background:rgba(255,255,255,.18);}
  .btn.gray{background:#94a3b8;}
  .btn.green{background:var(--green);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:14px 0;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .hidden{display:none!important;}
  input,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:1rem;font-family:inherit;margin:6px 0 12px;}
  label{font-size:.9rem;color:var(--muted);}
  .tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border);}
  .tabs button{flex:1;background:none;border:none;padding:10px;font-size:1rem;cursor:pointer;color:var(--muted);font-family:inherit;}
  .tabs button.active{color:var(--primary);border-bottom:3px solid var(--primary);font-weight:bold;}
  .msg{padding:10px 14px;border-radius:8px;margin:10px 0;font-size:.92rem;}
  .msg.error{background:var(--red-bg);color:var(--red);}
  .msg.ok{background:var(--green-bg);color:var(--green);}
  .unit-block h2{font-size:1.05rem;margin:18px 0 6px;color:var(--primary-dark);}
  .sub-card{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin:8px 0;cursor:pointer;}
  .sub-card:hover{border-color:var(--primary);}
  .sub-card .info{font-size:.85rem;color:var(--muted);}
  .sub-card.empty{opacity:.55;cursor:default;}
  .badge{font-size:.78rem;background:#e0e7ff;color:var(--primary-dark);border-radius:999px;padding:2px 10px;white-space:nowrap;}
  .badge.good{background:#dcfce7;color:var(--green);}
  .section-title{font-size:1.05rem;font-weight:bold;color:var(--primary-dark);margin:26px 0 4px;}
  .instructions{font-size:.9rem;color:var(--muted);margin-bottom:10px;}
  .passage{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px 16px;white-space:pre-wrap;margin:10px 0;font-size:.98rem;}
  .material{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px 16px;white-space:pre-wrap;margin:10px 0;font-size:.98rem;}
  .audiobox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px;margin:10px 0;}
  .question{margin:16px 0;padding:14px;border:1px solid var(--border);border-radius:10px;background:#fff;}
  .question .qtext{font-weight:bold;margin-bottom:8px;}
  .opt{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin:6px 0;cursor:pointer;}
  .opt:hover{background:#f8fafc;}
  .opt input{width:auto;margin:4px 0 0;}
  .opt.sel{border-color:var(--primary);background:#eff6ff;}
  .opt.correct{border-color:var(--green);background:var(--green-bg);}
  .opt.wrong{border-color:var(--red);background:var(--red-bg);}
  .explain{margin-top:10px;padding:10px 14px;border-radius:8px;background:#fffbeb;border:1px solid #fde68a;font-size:.93rem;}
  .explain b{color:var(--primary-dark);}
  .scorebox{text-align:center;padding:26px 16px;}
  .scorebox .big{font-size:2.6rem;font-weight:bold;color:var(--primary);}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:14px 0;flex-wrap:wrap;}
  table{width:100%;border-collapse:collapse;font-size:.88rem;}
  th,td{border:1px solid var(--border);padding:7px 9px;text-align:left;}
  th{background:#f8fafc;}
  tr:nth-child(even) td{background:#fafcff;}
  .right{text-align:right;}
  .center{text-align:center;}
  .footer-note{font-size:.78rem;color:var(--muted);text-align:center;margin:30px 0 14px;}
  .gbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#fff;color:#444;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:1rem;cursor:pointer;font-family:inherit;}
  .gbtn:hover{background:#f8fafc;}
  .progress-pill{font-size:.8rem;color:var(--muted);}
  @media(max-width:600px){ header h1{font-size:1rem;} .card{padding:14px;} }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>華語文能力測驗 B1｜練習平台</h1>
    <div class="userbox" id="userbox" style="display:none;">
      <span id="userName"></span>
      <button class="btn small ghost hidden" id="btnAdmin">教師後台</button>
      <button class="btn small ghost" id="btnHome">單元列表</button>
      <button class="btn small ghost" id="btnLogout">登出</button>
    </div>
  </div>
</header>

<div class="container">

  <!-- 設定提示 -->
  <div id="setupNotice" class="card hidden">
    <h2>⚙️ 還沒完成 Firebase 設定</h2>
    <p>請先依照「Firebase設定教學.md」建立 Firebase 專案，然後把金鑰填入 <b>index.html</b> 最上方 <b>firebaseConfig</b> 的位置。完成後重新整理此頁。</p>
  </div>

  <!-- 登入/註冊 -->
  <div id="authView" class="hidden">
    <div class="card" style="max-width:430px;margin:30px auto;">
      <div class="tabs">
        <button id="tabLogin" class="active">登入</button>
        <button id="tabRegister">建立帳號</button>
      </div>
      <div id="authMsg"></div>

      <div id="loginForm">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
        <label>密碼</label>
        <input type="password" id="loginPass" placeholder="密碼">
        <button class="btn" style="width:100%" id="btnLogin">登入</button>
        <p style="text-align:center;margin:10px 0;color:var(--muted);font-size:.85rem">或</p>
        <button class="gbtn" id="btnGoogle">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 18.9 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C36.9 40.2 44 35 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
          使用 Google（Gmail）登入
        </button>
        <p style="text-align:center;margin-top:12px;"><a href="#" id="linkForgot" style="font-size:.85rem;color:var(--muted);">忘記密碼？</a></p>
      </div>

      <div id="registerForm" class="hidden">
        <label>姓名（老師會看到這個名字）</label>
        <input type="text" id="regName" placeholder="例：王小明 / Maria">
        <label>Email（建議使用 Gmail）</label>
        <input type="email" id="regEmail" placeholder="you@gmail.com">
        <label>密碼（至少6個字）</label>
        <input type="password" id="regPass" placeholder="密碼">
        <button class="btn" style="width:100%" id="btnRegister">建立帳號</button>
      </div>
    </div>
  </div>

  <!-- 單元列表 -->
  <div id="unitsView" class="hidden">
    <div class="card" style="background:#eff6ff;">
      <b>📖 使用方式</b>：選一個小單元開始作答。交卷後會看到分數，答錯的題目會有解說。每個單元可以重複練習。
    </div>
    <div id="unitsList"></div>
  </div>

  <!-- 考試 -->
  <div id="quizView" class="hidden">
    <div class="topbar">
      <h2 id="quizTitle" style="font-size:1.1rem;"></h2>
      <span class="progress-pill" id="quizProgress"></span>
    </div>
    <div id="quizBody"></div>
    <div class="card center">
      <button class="btn green" id="btnSubmit" style="font-size:1.1rem;padding:12px 40px;">交卷</button>
      <p style="font-size:.85rem;color:var(--muted);margin-top:8px;">交卷後就會看到成績和解說</p>
    </div>
  </div>

  <!-- 成績 -->
  <div id="resultView" class="hidden">
    <div class="card scorebox">
      <div id="resultTitle" style="font-size:1.05rem;color:var(--muted);"></div>
      <div class="big" id="resultScore"></div>
      <div id="resultDetail" style="color:var(--muted);"></div>
      <div style="margin-top:14px;">
        <button class="btn" id="btnRetry">再做一次</button>
        <button class="btn gray" id="btnBackHome">回單元列表</button>
      </div>
    </div>
    <h2 style="font-size:1.05rem;margin:18px 0 4px;">答題回顧（答錯的題目附解說）</h2>
    <div id="reviewBody"></div>
  </div>

  <!-- 教師後台 -->
  <div id="adminView" class="hidden">
    <div class="topbar">
      <h2 style="font-size:1.15rem;">📊 教師後台</h2>
      <div>
        <button class="btn small" id="btnRefreshAdmin">重新整理</button>
        <button class="btn small gray" id="btnExportCsv">下載 CSV</button>
      </div>
    </div>
    <div class="card">
      <h3 style="font-size:1rem;margin-bottom:8px;">學生進度總覽（每個小單元的最佳成績）</h3>
      <div style="overflow-x:auto;"><table id="overviewTable"></table></div>
    </div>
    <div class="card">
      <h3 style="font-size:1rem;margin-bottom:8px;">所有作答紀錄</h3>
      <div class="topbar">
        <select id="filterSubunit" style="max-width:260px;"></select>
        <input type="text" id="filterName" placeholder="搜尋學生姓名或Email" style="max-width:260px;margin:0;">
      </div>
      <div style="overflow-x:auto;"><table id="resultsTable"></table></div>
    </div>
  </div>

  <p class="footer-note">本平台題目內容取自《華語文能力測驗（進階級）》，僅供本班教學使用，請勿外流或作商業用途。</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="quiz-data.js"></script>
<script>
/* ============================================================
   1) 把你的 Firebase 金鑰貼在這裡（見 Firebase設定教學.md）
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCSgZ9DmLuKIqqbxrVgAcUfy-QJFhzjjp8",
  authDomain: "qna-chinese.firebaseapp.com",
  projectId: "qna-chinese",
  storageBucket: "qna-chinese.firebasestorage.app",
  messagingSenderId: "645044163415",
  appId: "1:645044163415:web:c33d1a22422de3083b6412"
};

/* 2) 老師（管理者）的 Email：用這些帳號登入就會看到「教師後台」 */
const ADMIN_EMAILS = ["qnachinese@gmail.com"];

/* ============================================================ */
const isConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";
let auth=null, db=null, currentUser=null, isAdmin=false;
let currentSub=null, currentUnit=null, quizStartTime=null, lastResult=null;
let myBest={};   // subunitId -> {percent, attempts}

const $ = id => document.getElementById(id);
const views = ["authView","unitsView","quizView","resultView","adminView"];
function show(view){
  views.forEach(v=>$(v).classList.add("hidden"));
  if(view) $(view).classList.remove("hidden");
  window.scrollTo(0,0);
}
const LETTERS = ["A","B","C","D"];

/* ---------- 初始化 ---------- */
if(!isConfigured){
  $("setupNotice").classList.remove("hidden");
}else{
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
  auth.onAuthStateChanged(async user=>{
    currentUser = user;
    if(user){
      isAdmin = ADMIN_EMAILS.includes((user.email||"").toLowerCase());
      $("userbox").style.display="flex";
      $("userName").textContent = (user.displayName||user.email) + (isAdmin?"（老師）":"");
      $("btnAdmin").classList.toggle("hidden", !isAdmin);
      await ensureUserDoc(user);
      await loadMyBest();
      renderUnits();
      show("unitsView");
    }else{
      $("userbox").style.display="none";
      show("authView");
    }
  });
}

async function ensureUserDoc(user){
  try{
    await db.collection("users").doc(user.uid).set({
      name: user.displayName||"",
      email: user.email||"",
      lastLogin: firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  }catch(e){ console.warn(e); }
}

/* ---------- 登入 / 註冊 ---------- */
function authError(e){
  const map={
    "auth/invalid-email":"Email 格式不正確",
    "auth/user-not-found":"找不到這個帳號",
    "auth/wrong-password":"密碼錯誤",
    "auth/invalid-credential":"Email 或密碼錯誤",
    "auth/email-already-in-use":"這個 Email 已經註冊過了，請直接登入",
    "auth/weak-password":"密碼太短，至少要6個字",
    "auth/popup-closed-by-user":"已取消 Google 登入"
  };
  $("authMsg").innerHTML = `<div class="msg error">${map[e.code]||e.message}</div>`;
}
$("tabLogin").onclick=()=>{ $("tabLogin").classList.add("active");$("tabRegister").classList.remove("active");$("loginForm").classList.remove("hidden");$("registerForm").classList.add("hidden");$("authMsg").innerHTML=""; };
$("tabRegister").onclick=()=>{ $("tabRegister").classList.add("active");$("tabLogin").classList.remove("active");$("registerForm").classList.remove("hidden");$("loginForm").classList.add("hidden");$("authMsg").innerHTML=""; };

$("btnLogin").onclick=async()=>{
  try{ await auth.signInWithEmailAndPassword($("loginEmail").value.trim(), $("loginPass").value); }
  catch(e){ authError(e); }
};
$("btnRegister").onclick=async()=>{
  const name=$("regName").value.trim();
  if(!name){ $("authMsg").innerHTML='<div class="msg error">請輸入姓名</div>'; return; }
  try{
    const cred=await auth.createUserWithEmailAndPassword($("regEmail").value.trim(), $("regPass").value);
    await cred.user.updateProfile({displayName:name});
    await db.collection("users").doc(cred.user.uid).set({name, email:cred.user.email, createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    $("userName").textContent = name + (isAdmin?"（老師）":"");
  }catch(e){ authError(e); }
};
$("btnGoogle").onclick=async()=>{
  try{ await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  catch(e){ authError(e); }
};
$("linkForgot").onclick=async(ev)=>{
  ev.preventDefault();
  const email=$("loginEmail").value.trim();
  if(!email){ $("authMsg").innerHTML='<div class="msg error">請先在上面輸入你的 Email，再按「忘記密碼」</div>'; return; }
  try{ await auth.sendPasswordResetEmail(email); $("authMsg").innerHTML='<div class="msg ok">已寄出重設密碼的信，請到信箱收信</div>'; }
  catch(e){ authError(e); }
};
$("btnLogout").onclick=()=>auth.signOut();
$("btnHome").onclick=()=>{ renderUnits(); show("unitsView"); };
$("btnAdmin").onclick=()=>{ loadAdmin(); show("adminView"); };

/* ---------- 單元列表 ---------- */
async function loadMyBest(){
  myBest={};
  try{
    const snap=await db.collection("results").where("uid","==",currentUser.uid).get();
    snap.forEach(d=>{
      const r=d.data();
      const b=myBest[r.subunitId]||{percent:-1,attempts:0};
      b.attempts++;
      if(r.percent>b.percent) b.percent=r.percent;
      myBest[r.subunitId]=b;
    });
  }catch(e){ console.warn(e); }
}
function countQuestions(sub){ return sub.sections.reduce((s,sec)=>s+sec.questions.length,0); }

function renderUnits(){
  const wrap=$("unitsList"); wrap.innerHTML="";
  QUIZ_DATA.units.forEach(unit=>{
    const block=document.createElement("div");
    block.className="unit-block";
    block.innerHTML=`<h2>Unit ${unit.id}｜${unit.title}</h2>`;
    unit.subunits.forEach(sub=>{
      const total=countQuestions(sub);
      const card=document.createElement("div");
      if(total===0){
        card.className="sub-card empty";
        card.innerHTML=`<div><b>${sub.id}</b>　${sub.title}<div class="info">題目準備中</div></div><span class="badge">尚未開放</span>`;
      }else{
        const best=myBest[sub.id];
        const badge = best ? `<span class="badge ${best.percent>=80?'good':''}">最佳 ${best.percent}分｜做過${best.attempts}次</span>` : `<span class="badge">還沒做過</span>`;
        card.className="sub-card";
        card.innerHTML=`<div><b>${sub.id}</b>　${sub.title}<div class="info">${total} 題</div></div>${badge}`;
        card.onclick=()=>startQuiz(unit,sub);
      }
      block.appendChild(card);
    });
    wrap.appendChild(block);
  });
}

/* ---------- 考試 ---------- */
function startQuiz(unit,sub){
  currentUnit=unit; currentSub=sub; quizStartTime=Date.now();
  $("quizTitle").textContent=`${sub.id}　${sub.title}`;
  const body=$("quizBody"); body.innerHTML="";
  let qIndex=0;
  sub.sections.forEach((sec,sIdx)=>{
    const st=document.createElement("div");
    st.className="section-title"; st.textContent=sec.name;
    body.appendChild(st);
    if(sec.instructions){ const ins=document.createElement("div"); ins.className="instructions"; ins.textContent=sec.instructions; body.appendChild(ins); }
    if(sec.audio){ const au=document.createElement("div"); au.className="audiobox"; au.innerHTML=`<audio controls preload="none" src="${sec.audio}" style="width:100%"></audio>`; body.appendChild(au); }
    if(sec.passage){ const p=document.createElement("div"); p.className="passage"; p.textContent=sec.passage; body.appendChild(p); }
    if(sec.material){ const m=document.createElement("div"); m.className="material"; m.textContent=sec.material; body.appendChild(m); }
    sec.questions.forEach((q,qIdx)=>{
      qIndex++;
      const qd=document.createElement("div");
      qd.className="question"; qd.id=`q_${sIdx}_${qIdx}`;
      let opts="";
      q.opts.forEach((o,i)=>{
        opts+=`<label class="opt" data-s="${sIdx}" data-q="${qIdx}" data-i="${i}">
          <input type="radio" name="q${sIdx}_${qIdx}" value="${i}">
          <span><b>(${LETTERS[i]})</b> ${o}</span></label>`;
      });
      qd.innerHTML=`<div class="qtext">${qIndex}. ${q.q.replace(/＿＿/g,"＿＿＿")}</div>${opts}`;
      body.appendChild(qd);
    });
  });
  body.querySelectorAll(".opt").forEach(opt=>{
    opt.addEventListener("click",()=>{
      const name=`q${opt.dataset.s}_${opt.dataset.q}`;
      document.querySelectorAll(`[data-s="${opt.dataset.s}"][data-q="${opt.dataset.q}"]`).forEach(o=>o.classList.remove("sel"));
      opt.classList.add("sel");
      opt.querySelector("input").checked=true;
      updateProgress();
    });
  });
  updateProgress();
  show("quizView");
}
function updateProgress(){
  const total=countQuestions(currentSub);
  const done=$("quizBody").querySelectorAll("input:checked").length;
  $("quizProgress").textContent=`已作答 ${done} / ${total} 題`;
}

$("btnSubmit").onclick=async()=>{
  const total=countQuestions(currentSub);
  const done=$("quizBody").querySelectorAll("input:checked").length;
  if(done<total && !confirm(`還有 ${total-done} 題沒作答，確定要交卷嗎？`)) return;

  let correct=0; const answers=[];
  currentSub.sections.forEach((sec,sIdx)=>{
    sec.questions.forEach((q,qIdx)=>{
      const sel=$("quizBody").querySelector(`input[name="q${sIdx}_${qIdx}"]:checked`);
      const chosen = sel? parseInt(sel.value): -1;
      if(chosen===q.ans) correct++;
      answers.push({section:sec.name, n:q.n, chosen, ans:q.ans});
    });
  });
  const percent=Math.round(correct/total*100);
  const duration=Math.round((Date.now()-quizStartTime)/1000);
  lastResult={correct,total,percent,answers,duration};

  try{
    await db.collection("results").add({
      uid: currentUser.uid,
      name: currentUser.displayName||"",
      email: currentUser.email||"",
      unitId: currentUnit.id,
      subunitId: currentSub.id,
      subunitTitle: currentSub.title,
      score: correct, total, percent,
      durationSec: duration,
      answers,
      finishedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(e){
    alert("成績上傳失敗（"+e.message+"），但你仍可查看本次結果。");
  }
  await loadMyBest();
  renderResult();
  show("resultView");
};

/* ---------- 成績與回顧 ---------- */
function renderResult(){
  const r=lastResult;
  $("resultTitle").textContent=`${currentSub.id}　${currentSub.title}`;
  $("resultScore").textContent=`${r.percent} 分`;
  $("resultDetail").textContent=`答對 ${r.correct} / ${r.total} 題｜用時 ${Math.floor(r.duration/60)} 分 ${r.duration%60} 秒`;
  const body=$("reviewBody"); body.innerHTML="";
  let qIndex=0, ai=0;
  currentSub.sections.forEach(sec=>{
    const st=document.createElement("div");
    st.className="section-title"; st.textContent=sec.name;
    body.appendChild(st);
    if(sec.audio){ const au=document.createElement("div"); au.className="audiobox"; au.innerHTML=`<audio controls preload="none" src="${sec.audio}" style="width:100%"></audio>`; body.appendChild(au); }
    if(sec.passage){ const p=document.createElement("div"); p.className="passage"; p.textContent=sec.passage; body.appendChild(p); }
    if(sec.material){ const m=document.createElement("div"); m.className="material"; m.textContent=sec.material; body.appendChild(m); }
    sec.questions.forEach(q=>{
      qIndex++;
      const a=lastResult.answers[ai++];
      const right=a.chosen===q.ans;
      const qd=document.createElement("div");
      qd.className="question";
      let opts="";
      q.opts.forEach((o,i)=>{
        let cls="opt";
        if(i===q.ans) cls+=" correct";
        else if(i===a.chosen) cls+=" wrong";
        const mark = i===q.ans ? " ✔" : (i===a.chosen ? " ✘" : "");
        opts+=`<div class="${cls}"><span><b>(${LETTERS[i]})</b> ${o}${mark}</span></div>`;
      });
      const status = right? `<span style="color:var(--green)">✔ 答對</span>`
        : (a.chosen===-1? `<span style="color:var(--red)">未作答</span>`:`<span style="color:var(--red)">✘ 答錯</span>`);
      let explain="";
      if(!right){
        explain=`<div class="explain"><b>正確答案：(${LETTERS[q.ans]}) ${q.opts[q.ans]}</b><br>${q.exp||""}</div>`;
      }
      qd.innerHTML=`<div class="qtext">${qIndex}. ${q.q}　${status}</div>${opts}${explain}`;
      body.appendChild(qd);
    });
  });
}
$("btnRetry").onclick=()=>startQuiz(currentUnit,currentSub);
$("btnBackHome").onclick=()=>{ renderUnits(); show("unitsView"); };

/* ---------- 教師後台 ---------- */
let adminResults=[];
async function loadAdmin(){
  $("resultsTable").innerHTML="<tr><td>載入中…</td></tr>";
  try{
    const snap=await db.collection("results").orderBy("finishedAt","desc").limit(1000).get();
    adminResults=snap.docs.map(d=>{const r=d.data(); r._id=d.id; return r;});
  }catch(e){
    $("resultsTable").innerHTML=`<tr><td>讀取失敗：${e.message}<br>（請確認 Firestore 安全規則已照教學設定，且你用的是老師帳號）</td></tr>`;
    return;
  }
  buildSubunitFilter();
  renderOverview();
  renderResultsTable();
}
function allSubunits(){
  const list=[];
  QUIZ_DATA.units.forEach(u=>u.subunits.forEach(s=>{ if(s.sections.length) list.push(s); }));
  return list;
}
function buildSubunitFilter(){
  const sel=$("filterSubunit");
  sel.innerHTML=`<option value="">全部小單元</option>`;
  allSubunits().forEach(s=>{ sel.innerHTML+=`<option value="${s.id}">${s.id} ${s.title}</option>`; });
  sel.onchange=renderResultsTable;
  $("filterName").oninput=renderResultsTable;
}
function renderOverview(){
  const subs=allSubunits();
  const students={};
  adminResults.forEach(r=>{
    const key=r.uid;
    if(!students[key]) students[key]={name:r.name||r.email, email:r.email, best:{}, count:0};
    students[key].count++;
    const b=students[key].best[r.subunitId];
    if(b===undefined || r.percent>b) students[key].best[r.subunitId]=r.percent;
  });
  let html=`<tr><th>學生</th>${subs.map(s=>`<th class="center">${s.id}</th>`).join("")}<th class="center">作答次數</th></tr>`;
  const arr=Object.values(students).sort((a,b)=>a.name.localeCompare(b.name,"zh-Hant"));
  if(arr.length===0) html+=`<tr><td colspan="${subs.length+2}">還沒有學生作答紀錄</td></tr>`;
  arr.forEach(st=>{
    html+=`<tr><td>${st.name}<br><span style="color:var(--muted);font-size:.78rem">${st.email}</span></td>`;
    subs.forEach(s=>{
      const v=st.best[s.id];
      html+= v===undefined? `<td class="center" style="color:#cbd5e1">—</td>`
        : `<td class="center" style="color:${v>=60?'var(--green)':'var(--red)'};font-weight:bold">${v}</td>`;
    });
    html+=`<td class="center">${st.count}</td></tr>`;
  });
  $("overviewTable").innerHTML=html;
}
function fmtDate(ts){
  if(!ts||!ts.toDate) return "";
  const d=ts.toDate();
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function filteredResults(){
  const su=$("filterSubunit").value, name=$("filterName").value.trim().toLowerCase();
  return adminResults.filter(r=>
    (!su || r.subunitId===su) &&
    (!name || (r.name||"").toLowerCase().includes(name) || (r.email||"").toLowerCase().includes(name))
  );
}
function renderResultsTable(){
  const rows=filteredResults();
  let html=`<tr><th>時間</th><th>學生</th><th>小單元</th><th class="center">分數</th><th class="center">答對/總題</th><th class="center">用時</th></tr>`;
  if(rows.length===0) html+=`<tr><td colspan="6">沒有符合的紀錄</td></tr>`;
  rows.forEach(r=>{
    html+=`<tr>
      <td>${fmtDate(r.finishedAt)}</td>
      <td>${r.name||""}<br><span style="color:var(--muted);font-size:.78rem">${r.email||""}</span></td>
      <td>${r.subunitId} ${r.subunitTitle||""}</td>
      <td class="center" style="font-weight:bold;color:${r.percent>=60?'var(--green)':'var(--red)'}">${r.percent}</td>
      <td class="center">${r.score}/${r.total}</td>
      <td class="center">${Math.floor((r.durationSec||0)/60)}分${(r.durationSec||0)%60}秒</td>
    </tr>`;
  });
  $("resultsTable").innerHTML=html;
}
$("btnRefreshAdmin").onclick=loadAdmin;
$("btnExportCsv").onclick=()=>{
  const rows=filteredResults();
  let csv="﻿時間,姓名,Email,小單元,分數,答對,總題數,用時(秒)\n";
  rows.forEach(r=>{
    csv+=`"${fmtDate(r.finishedAt)}","${r.name||""}","${r.email||""}","${r.subunitId}",${r.percent},${r.score},${r.total},${r.durationSec||0}\n`;
  });
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="成績紀錄.csv";
  a.click();
};
</script>
